<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Mestre - Monitor em Tempo Real</title>
    <style>
        /* --- ESTILO GÓTICO / DARK FANTASY (Idêntico à sua ficha) --- */
        * {
            box-sizing: border-box;
            font-family: 'Georgia', 'Times New Roman', Times, serif; 
            transition: background-color 0.5s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        body {
            background-color: #050505;
            color: #c0c0c0;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        }

        h1 {
            color: #8b0000;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(139, 0, 0, 0.6);
            margin-bottom: 30px;
            border-bottom: 1px solid #8b0000;
            padding-bottom: 15px;
        }

        .grid-jogadores {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .card-jogador {
            background-color: #121212;
            border: 2px solid #333;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Linha decorativa gótica superior */
        .card-jogador::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: #8b0000;
            box-shadow: 0 0 10px #8b0000;
        }

        .card-jogador h3 {
            color: #8b0000;
            margin-top: 0;
            margin-bottom: 5px;
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
            font-size: 22px;
            letter-spacing: 1px;
            text-align: center;
        }

        .card-secao-titulo {
            color: #8b0000;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 5px 0 2px 0;
            font-weight: bold;
        }

        .status-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .status-linha {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            padding: 6px 10px;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            font-size: 13px;
        }

        .status-linha span:first-child {
            color: #888;
            font-weight: bold;
            font-size: 0.8em;
            text-transform: uppercase;
        }

        .destaque {
            color: #e0e0e0;
            font-weight: bold;
        }

        /* Atributos em Grid Compacto */
        .atributos-resumo {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .attr-item {
            background: #161616;
            border: 1px solid #2a2a2a;
            padding: 4px;
            text-align: center;
            border-radius: 4px;
            font-size: 13px;
        }
        .attr-item span {
            display: block;
            font-size: 9px;
            color: #666;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Listas Dinâmicas com Scrollbar Gótica */
        .sub-lista {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 12px;
            max-height: 75px;
            overflow-y: auto;
            background: #161616;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            padding: 5px;
        }
        .sub-lista li {
            padding: 3px 5px;
            border-bottom: 1px solid #222;
            color: #b0b0b0;
            line-height: 1.3;
        }
        .sub-lista li:last-child { border-bottom: none; }
        
        /* Scrollbar Personalizada */
        .sub-lista::-webkit-scrollbar { width: 4px; }
        .sub-lista::-webkit-scrollbar-track { background: #111; }
        .sub-lista::-webkit-scrollbar-thumb { background: #8b0000; }

        .alerta-vida { color: #ff4d4d !important; text-shadow: 0 0 8px rgba(255, 77, 77, 0.4); }
        .alerta-corrupcao { color: #9d00ff !important; text-shadow: 0 0 8px rgba(157, 0, 255, 0.4); }
        .alerta-combate { color: #ffcc00 !important; }

        .mensagem-vazia {
            text-align: center;
            width: 100%;
            grid-column: 1 / -1;
            color: #666;
            font-style: italic;
            font-size: 18px;
            margin-top: 50px;
        }

        /* --- TELA DE LOGIN --- */
        #janela-login-mestre {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; justify-content: center;
            align-items: center; z-index: 99999;
        }
        .caixa-login {
            background: #121212; border: 2px solid #8b0000; padding: 30px;
            border-radius: 8px; width: 320px; text-align: center;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.5);
        }
        .caixa-login h2 { color: #8b0000; margin-top: 0; margin-bottom: 20px; }
        .caixa-login input {
            width: 100%; margin-bottom: 15px; padding: 10px;
            background: #1a1a1a; border: 1px solid #444; color: #e0e0e0; border-radius: 4px;
        }
        .caixa-login button {
            width: 100%; padding: 10px; background: #8b0000; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .caixa-login button:hover { background: #b30000; }
        #erro-login { color: #ff3333; font-size: 13px; margin-top: 10px; }
        
        #btn-deslogar-mestre {
            position: fixed; top: 15px; right: 15px; z-index: 9999;
            background: #121212; color: #8b0000; border: 1px solid #8b0000;
            padding: 8px 15px; font-weight: bold; border-radius: 4px; cursor: pointer;
            text-transform: uppercase; font-size: 11px;
        }
    </style>
</head>
<body>

    <button id="btn-deslogar-mestre" onclick="fazerLogout()" style="display: none;">Sair do Painel</button>

    <div id="janela-login-mestre">
        <div class="caixa-login">
            <h2>Autenticação do Mestre</h2>
            <input type="text" id="login-usuario" placeholder="Nome de Usuário ou E-mail">
            <input type="password" id="login-senha" placeholder="Senha">
            <button onclick="fazerLogin()">Acessar Painel</button>
            <div id="erro-login"></div>
        </div>
    </div>

    <h1>Painel de Monitoramento do Mestre</h1>
    
    <div class="grid-jogadores" id="painel-jogadores">
        <p class="mensagem-vazia">Aguardando as brumas se dissiparem e os jogadores conectarem...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        // 1. CONFIGURAÇÃO DO SEU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyATx_yfWsUCHRemaC3oOKr_EQV8MV-T_GU",
  authDomain: "as-torres-de-alem-mundo.firebaseapp.com",
  projectId: "as-torres-de-alem-mundo",
  storageBucket: "as-torres-de-alem-mundo.firebasestorage.app",
  messagingSenderId: "720161540231",
  appId: "1:720161540231:web:c1a634f8596f43877b5022"
        };

        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();
        
        let escutadorAtivo = null;

        // FUNÇÃO DE MASCARAMENTO INTELIGENTE
        function gerarEmailFake(usuario) {
            let nomeLimpo = usuario.trim().toLowerCase();
            if (nomeLimpo.includes('@')) {
                return nomeLimpo;
            }
            nomeLimpo = nomeLimpo.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            nomeLimpo = nomeLimpo.replace(/[^a-z0-9_.-]/g, '');
            if (!nomeLimpo) nomeLimpo = "usuarioanonimo";
            return nomeLimpo + "@sistemarpg.com";
        }

        // 2. MONITOR DE SESSÃO DO MESTRE
        auth.onAuthStateChanged((user) => {
            const janelaLogin = document.getElementById('janela-login-mestre');
            const btnDeslogar = document.getElementById('btn-deslogar-mestre');
            
            if (user) {
                janelaLogin.style.display = 'none';
                btnDeslogar.style.display = 'block';
                ativarMonitoramentoAoVivo();
            } else {
                janelaLogin.style.display = 'flex';
                btnDeslogar.style.display = 'none';
                document.getElementById('painel-jogadores').innerHTML = '<p class="mensagem-vazia">Efetue o login para visualizar as fichas.</p>';
                
                if (escutadorAtivo) {
                    database.ref('personagens').off('value', escutadorAtivo);
                    escutadorAtivo = null;
                }
            }
        });

        // 3. FUNÇÃO DE LOGIN DO PAINEL
        function fazerLogin() {
            const usuario = document.getElementById('login-usuario').value;
            const senha = document.getElementById('login-senha').value;
            const divErro = document.getElementById('erro-login');
            divErro.innerText = "";

            if (!usuario || !senha) {
                divErro.innerText = "Preencha todos os campos.";
                return;
            }

            const emailGerado = gerarEmailFake(usuario);

            auth.signInWithEmailAndPassword(emailGerado, senha)
                .catch((error) => {
                    divErro.innerText = "Acesso negado (" + error.code + "). Verifique os dados.";
                    console.error("Erro completo do Firebase:", error);
                });
        }

        // 4. FUNÇÃO DE LOGOUT DO PAINEL
        function fazerLogout() {
            auth.signOut().catch(err => console.error(err));
        }

        // 5. ESCUTADOR EM TEMPO REAL COMPLETO (Captura perfeitamente o index1.html)
        function activarMonitoramentoAoVivo() {
            ativarMonitoramentoAoVivo();
        }

        function ativarMonitoramentoAoVivo() {
            if (escutadorAtivo) return;

            escutadorAtivo = database.ref('personagens').on('value', (snapshot) => {
                const personagens = snapshot.val();
                const painel = document.getElementById('painel-jogadores');
                painel.innerHTML = ""; 

                if (!personagens) {
                    painel.innerHTML = '<p class="mensagem-vazia">Nenhum personagem encontrado nas brumas do banco de dados.</p>';
                    return;
                }

                for (let id in personagens) {
                    const ficha = personagens[id];
                    
                    // Extração correta das subpastas criadas pela ficha do index1.html
                    const inputs = ficha.inputs || {};
                    const itens = ficha.itens || [];
                    const habilidades = ficha.habilidades || [];
                    const obeliscos = ficha.obeliscos || [];
                    const monolitos = ficha.monolitos || [];
                    const torres = ficha.torres || [];
                    const pilares = ficha.pilares || [];

                    // Dados Básicos
                    const nomePersonagem = inputs['char-name'] || "Viajante Sem Nome";
                    const classe = inputs['char-class'] || "Sem Classe";
                    const nivel = inputs['char-level'] || "1";
                    
                    // Vitas e Combate
                    const vidaAtual = inputs['vida-atual'] || "0";
                    const vidaMax = inputs['max-vida'] || "0";
                    const corrupcaoAtual = inputs['corrupcao-atual'] || "0";
                    const corrupcaoMax = inputs['max-corrupcao'] || "0";
                    const valorDefesa = inputs['defesa-val'] || "0";
                    const valorBP = inputs['bp-val'] || "0";

                    // Atributos
                    const forca = inputs['forca'] || "10";
                    const destreza = inputs['destreza'] || "10";
                    const constituicao = inputs['constituicao'] || "10";
                    const inteligencia = inputs['inteligencia'] || "10";
                    const sabedoria = inputs['sabedoria'] || "10";
                    const carisma = inputs['carisma'] || "10";

                    // Construção das listas dinâmicas de Itens
                    let htmlItens = "";
                    if (itens.length > 0) {
                        itens.forEach(i => { if(i.nome) htmlItens += `<li>${i.nome} (x${i.qtd || 1})</li>`; });
                    }
                    if (!htmlItens) htmlItens = "<li>Nenhum item carregado.</li>";

                    // Construção das listas de Habilidades
                    let htmlHabs = "";
                    if (habilidades.length > 0) {
                        habilidades.forEach(h => { if(h.nome) htmlHabs += `<li><strong>${h.nome}</strong>: ${h.desc || ''}</li>`; });
                    }
                    if (!htmlHabs) htmlHabs = "<li>Nenhuma habilidade listada.</li>";

                    // Construção das esferas de conexão agrupadas
                    let conexoes = [];
                    if (obeliscos.length > 0) obeliscos.forEach(o => { if(o) conexoes.push(`Obelisco: ${o}`); });
                    if (monolitos.length > 0) monolitos.forEach(m => { if(m) conexoes.push(`Monolito: ${m}`); });
                    if (torres.length > 0) torres.forEach(t => { if(t) conexoes.push(`Torre: ${t}`); });
                    if (pilares.length > 0) pilares.forEach(p => { if(p) conexoes.push(`Pilar: ${p}`); });
                    
                    let htmlConexoes = "";
                    conexoes.forEach(c => { htmlConexoes += `<li>${c}</li>`; });
                    if (!htmlConexoes) htmlConexoes = "<li>Nenhuma esfera conectada.</li>";

                    // Criando o elemento visual do card completo
                    const card = document.createElement('div');
                    card.className = 'card-jogador';
                    card.innerHTML = `
                        <h3>${nomePersonagem}</h3>
                        
                        <div class="status-container">
                            <div class="status-linha"><span>Classe:</span> <span class="destaque">${classe}</span></div>
                            <div class="status-linha"><span>Nível:</span> <span class="destaque">${nivel}</span></div>
                        </div>

                        <div class="status-container">
                            <div class="status-linha"><span>Vida:</span> <span class="destaque alerta-vida">${vidaAtual}/${vidaMax}</span></div>
                            <div class="status-linha"><span>Corrupção:</span> <span class="destaque alerta-corrupcao">${corrupcaoAtual}/${corrupcaoMax}</span></div>
                        </div>

                        <div class="status-container">
                            <div class="status-linha"><span>Defesa:</span> <span class="destaque alerta-combate">${valorDefesa}</span></div>
                            <div class="status-linha"><span>B.P:</span> <span class="destaque alerta-combate">${valorBP}</span></div>
                        </div>

                        <div class="card-secao-titulo">Atributos</div>
                        <div class="atributos-resumo">
                            <div class="attr-item"><span>FOR</span><strong>${forca}</strong></div>
                            <div class="attr-item"><span>DES</span><strong>${destreza}</strong></div>
                            <div class="attr-item"><span>CON</span><strong>${constituicao}</strong></div>
                            <div class="attr-item"><span>INT</span><strong>${inteligencia}</strong></div>
                            <div class="attr-item"><span>SAB</span><strong>${sabedoria}</strong></div>
                            <div class="attr-item"><span>CAR</span><strong>${carisma}</strong></div>
                        </div>

                        <div class="card-secao-titulo">Inventário / Equipamento</div>
                        <ul class="sub-lista">${htmlItens}</ul>

                        <div class="card-secao-titulo">Habilidades / Magias</div>
                        <ul class="sub-lista">${htmlHabs}</ul>

                        <div class="card-secao-titulo">Esferas de Conexão</div>
                        <ul class="sub-lista">${htmlConexoes}</ul>
                    `;
                    
                    painel.appendChild(card);
                }
            });
        }
    </script>
</body>
</html>
