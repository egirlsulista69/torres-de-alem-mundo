<!DOCTYPE html>
<html lang="pt-BR"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Interativa - Evandro Nunes</title>
    <style>
        /* --- ESTILO GÓTICO / DARK FANTASY --- */
        * {
            box-sizing: border-box;
            font-family: 'Georgia', 'Times New Roman', Times, serif; 
            transition: background-color 0.5s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        body {
            background-color: #050505;
            color: #c0c0c0;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        }

        /* Inputs Gerais */
        input, select, textarea {
            background-color: #1a1a1a;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 5px;
            border-radius: 3px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #8b0000;
            box-shadow: 0 0 5px rgba(139, 0, 0, 0.5);
        }

        /* Estrutura principal da ficha */
        .ficha-container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #111;
            border: 2px solid #8b0000;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8), inset 0 0 10px rgba(139, 0, 0, 0.2);
            padding: 20px;
            border-radius: 8px;
        }

        .cabecalho {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            border-bottom: 2px dashed #444;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .campo-cabecalho {
            display: flex;
            flex-direction: column;
        }
        .campo-cabecalho label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b0000;
            margin-bottom: 5px;
        }

        .grid-principal {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid-principal {
                grid-template-columns: 1fr;
            }
        }

        .painel-lateral {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .secao {
            background-color: #161616;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 15px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }

        .secao-titulo {
            color: #8b0000;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid #8b0000;
            padding-bottom: 5px;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Atributos */
        .atributos-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .atributo-box {
            background-color: #222;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
        }

        .atributo-box label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 5px;
        }

        .attr-big-input {
            width: 60px;
            font-size: 24px;
            text-align: center;
            font-weight: bold;
            border-color: #555;
        }

        /* Status (Barras) */
        .status-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .barra-container {
            position: relative;
            background-color: #222;
            border: 1px solid #444;
            height: 30px;
            border-radius: 4px;
            overflow: hidden;
        }

        .barra-preenchimento {
            height: 100%;
            width: 50%;
            transition: width 0.3s ease;
        }

        .barra-vida { background-color: #8b0000; }
        .barra-corrupcao { background-color: #4b0082; }

        .barra-texto {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 1px 1px 2px #000;
        }

        .stat-controles {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        .stat-input {
            width: 50px;
            text-align: center;
        }
        .stat-input-edit {
            width: 50px;
            text-align: center;
            background-color: #2c1a1a;
            border-color: #8b0000;
        }

        /* Esferas menores de combate */
        .esferas-menores-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .esfera-menor-box {
            background-color: #222;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
        }
        .esfera-menor-box label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: #8b0000;
            margin-bottom: 5px;
        }
        .esfera-menor-input {
            width: 100%;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }

        /* Itens e Habilidades dinâmicas */
        .lista-dinamica {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item-linha, .hab-linha, .obelisco-linha, .monolito-linha, .torre-linha, .pilar-linha {
            display: flex;
            gap: 10px;
            align-items: center;
            background-color: #1f1f1f;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #333;
        }

        .btn-adicionar {
            background-color: #8b0000;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .btn-adicionar:hover { background-color: #a80000; }

        .btn-remover {
            background-color: #333;
            color: #ff3333;
            border: 1px solid #444;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }
        .btn-remover:hover { background-color: #444; }

        /* Esferas de Conexão */
        .esferas-conexao-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .esfera-card {
            background-color: #121212;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .esfera-card h4 {
            color: #8b0000;
            margin-top: 0;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="ficha-container">
        
        <!-- CABEÇALHO -->
        <div class="cabecalho">
            <div class="campo-cabecalho">
                <label for="char-name">Nome do Personagem</label>
                <input type="text" id="char-name" placeholder="Ex: Evandro Nunes">
            </div>
            <div class="campo-cabecalho">
                <label for="char-class">Classe</label>
                <input type="text" id="char-class" placeholder="Ex: Guerreiro">
            </div>
            <div class="campo-cabecalho">
                <label for="char-level">Nível</label>
                <input type="number" id="char-level" value="1" min="1">
            </div>
        </div>

        <div class="grid-principal">
            
            <!-- COLUNA ESQUERDA: ATRIBUTOS, STATUS E COMBATE -->
            <div class="painel-lateral">
                
                <!-- ATRIBUTOS -->
                <div class="secao">
                    <h3 class="secao-titulo">Atributos</h3>
                    <div class="atributos-grid">
                        <div class="atributo-box">
                            <label for="forca">Força</label>
                            <input type="number" id="forca" class="attr-big-input" value="10">
                        </div>
                        <div class="atributo-box">
                            <label for="destreza">Destreza</label>
                            <input type="number" id="destreza" class="attr-big-input" value="10">
                        </div>
                        <div class="atributo-box">
                            <label for="constituicao">Constituição</label>
                            <input type="number" id="constituicao" class="attr-big-input" value="10">
                        </div>
                        <div class="atributo-box">
                            <label for="inteligencia">Inteligência</label>
                            <input type="number" id="inteligencia" class="attr-big-input" value="10">
                        </div>
                        <div class="atributo-box">
                            <label for="sabedoria">Sabedoria</label>
                            <input type="number" id="sabedoria" class="attr-big-input" value="10">
                        </div>
                        <div class="atributo-box">
                            <label for="carisma">Carisma</label>
                            <input type="number" id="carisma" class="attr-big-input" value="10">
                        </div>
                    </div>
                </div>

                <!-- STATUS (VITAIS) -->
                <div class="secao">
                    <h3 class="secao-titulo">Status Vitais</h3>
                    <div class="status-container">
                        <!-- Vida -->
                        <div>
                            <label style="font-size: 11px; text-transform: uppercase;">Pontos de Vida</label>
                            <div class="barra-container">
                                <div id="barra-vida" class="barra-preenchimento barra-vida" style="width: 100%;"></div>
                                <div id="texto-vida" class="barra-texto">100 / 100</div>
                            </div>
                            <div class="stat-controles">
                                <input type="number" id="vida-atual" class="stat-input" value="100" placeholder="Atual">
                                <span style="align-self: center;">/</span>
                                <input type="number" id="max-vida" class="stat-input-edit" value="100" placeholder="Max">
                            </div>
                        </div>

                        <!-- Corrupção -->
                        <div>
                            <label style="font-size: 11px; text-transform: uppercase;">Corrupção</label>
                            <div class="barra-container">
                                <div id="barra-corrupcao" class="barra-preenchimento barra-corrupcao" style="width: 0%;"></div>
                                <div id="texto-corrupcao" class="barra-texto">0 / 50</div>
                            </div>
                            <div class="stat-controles">
                                <input type="number" id="corrupcao-atual" class="stat-input" value="0" placeholder="Atual">
                                <span style="align-self: center;">/</span>
                                <input type="number" id="max-corrupcao" class="stat-input-edit" value="50" placeholder="Max">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ESFERAS MENORES DE COMBATE -->
                <div class="secao">
                    <h3 class="secao-titulo">Combate</h3>
                    <div class="esferas-menores-grid">
                        <div class="esfera-menor-box">
                            <label for="defesa-val">Defesa</label>
                            <input type="number" id="defesa-val" class="esfera-menor-input" value="10">
                        </div>
                        <div class="esfera-menor-box">
                            <label for="bp-val">B.P (Poder)</label>
                            <input type="number" id="bp-val" class="esfera-menor-input" value="0">
                        </div>
                    </div>
                </div>

            </div>

            <!-- COLUNA DIREITA: EQUIPAMENTO, HABILIDADES E ESFERAS DE CONEXÃO -->
            <div class="painel-principal">
                
                <!-- INVENTÁRIO -->
                <div class="secao" style="margin-bottom: 20px;">
                    <h3 class="secao-titulo">Inventário / Equipamento</h3>
                    <div id="lista-itens" class="lista-dinamica">
                        <!-- Inserido dinamicamente via JS -->
                    </div>
                    <button class="btn-adicionar" onclick="novoItem()">+ Adicionar Item</button>
                </div>

                <!-- HABILIDADES -->
                <div class="secao" style="margin-bottom: 20px;">
                    <h3 class="secao-titulo">Habilidades / Magias</h3>
                    <div id="lista-habilidades" class="lista-dinamica">
                        <!-- Inserido dinamicamente via JS -->
                    </div>
                    <button class="btn-adicionar" onclick="novaHabilidade()">+ Adicionar Habilidade</button>
                </div>

                <!-- ESFERAS DE CONEXÃO -->
                <div class="secao">
                    <h3 class="secao-titulo">Esferas de Conexão</h3>
                    <div class="esferas-conexao-grid">
                        
                        <!-- OBELISCO -->
                        <div class="esfera-card">
                            <h4>Obelisco</h4>
                            <div id="lista-obelisco" class="lista-dinamica"></div>
                            <button class="btn-adicionar" style="font-size: 9px; padding: 5px;" onclick="novoObelisco()">+ Conectar</button>
                        </div>

                        <!-- MONOLITO -->
                        <div class="esfera-card">
                            <h4>Monolito</h4>
                            <div id="lista-monolito" class="lista-dinamica"></div>
                            <button class="btn-adicionar" style="font-size: 9px; padding: 5px;" onclick="novoMonolito()">+ Conectar</button>
                        </div>

                        <!-- TORRE -->
                        <div class="esfera-card">
                            <h4>Torre</h4>
                            <div id="lista-torre" class="lista-dinamica"></div>
                            <button class="btn-adicionar" style="font-size: 9px; padding: 5px;" onclick="novaTorre()">+ Conectar</button>
                        </div>

                        <!-- PILAR -->
                        <div class="esfera-card">
                            <h4>Pilar</h4>
                            <div id="lista-pilar" class="lista-dinamica"></div>
                            <button class="btn-adicionar" style="font-size: 9px; padding: 5px;" onclick="novoPilar()">+ Conectar</button>
                        </div>

                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- SCRIPT DE COMPORTAMENTO INTERNO DO RPG -->
    <script>
        function calcularTudo() {
            // Reservado para futuras automações de cálculos de atributos e status
        }

        function atualizarBarras() {
            // Vida
            const vidaAt = parseFloat(document.getElementById('vida-atual').value) || 0;
            const vidaMx = parseFloat(document.getElementById('max-vida').value) || 1;
            const pctVida = Math.min(100, Math.max(0, (vidaAt / vidaMx) * 100));
            document.getElementById('barra-vida').style.width = pctVida + '%';
            document.getElementById('texto-vida').innerText = `${vidaAt} / ${vidaMx}`;

            // Corrupção
            const corrAt = parseFloat(document.getElementById('corrupcao-atual').value) || 0;
            const corrMx = parseFloat(document.getElementById('max-corrupcao').value) || 1;
            const pctCorr = Math.min(100, Math.max(0, (corrAt / corrMx) * 100));
            document.getElementById('barra-corrupcao').style.width = pctCorr + '%';
            document.getElementById('texto-corrupcao').innerText = `${corrAt} / ${corrMx}`;
        }

        // --- SISTEMAS DE ADICIONAR ITENS E HABILIDADES ---
        function novoItem(nome = '', qtd = 1) {
            const container = document.getElementById('lista-itens');
            const div = document.createElement('div');
            div.className = 'item-linha';
            div.innerHTML = `
                <input type="text" placeholder="Nome do Item" value="${nome}" style="flex: 2;">
                <input type="number" placeholder="Qtd" value="${qtd}" style="width: 60px;">
                <button class="btn-remover" onclick="this.parentElement.remove(); salvarAutomatico();">X</button>
            `;
            container.appendChild(div);
            salvarAutomatico();
        }

        function novaHabilidade(nome = '', desc = '') {
            const container = document.getElementById('lista-habilidades');
            const div = document.createElement('div');
            div.className = 'hab-linha';
            div.innerHTML = `
                <input type="text" placeholder="Habilidade" value="${nome}" style="flex: 1; font-weight: bold;">
                <input type="text" placeholder="Descrição do efeito" value="${desc}" style="flex: 2;">
                <button class="btn-remover" onclick="this.parentElement.remove(); salvarAutomatico();">X</button>
            `;
            container.appendChild(div);
            salvarAutomatico();
        }

        // Conexões menores (Obeliscos, Monolitos, etc.)
        function novoObelisco(val = '') {
            const container = document.getElementById('lista-obelisco');
            const div = document.createElement('div');
            div.className = 'obelisco-linha';
            div.innerHTML = `
                <input type="text" placeholder="Efeito" value="${val}" style="width: 100%; font-size: 11px;">
                <button class="btn-remover" style="padding: 2px 5px; font-size: 10px;" onclick="this.parentElement.remove(); salvarAutomatico();">X</button>
            `;
            container.appendChild(div);
            salvarAutomatico();
        }

        function novoMonolito(val = '') {
            const container = document.getElementById('lista-monolito');
            const div = document.createElement('div');
            div.className = 'monolito-linha';
            div.innerHTML = `
                <input type="text" placeholder="Efeito" value="${val}" style="width: 100%; font-size: 11px;">
                <button class="btn-remover" style="padding: 2px 5px; font-size: 10px;" onclick="this.parentElement.remove(); salvarAutomatico();">X</button>
            `;
            container.appendChild(div);
            salvarAutomatico();
        }

        function novaTorre(val = '') {
            const container = document.getElementById('lista-torre');
            const div = document.createElement('div');
            div.className = 'torre-linha';
            div.innerHTML = `
                <input type="text" placeholder="Efeito" value="${val}" style="width: 100%; font-size: 11px;">
                <button class="btn-remover" style="padding: 2px 5px; font-size: 10px;" onclick="this.parentElement.remove(); salvarAutomatico();">X</button>
            `;
            container.appendChild(div);
            salvarAutomatico();
        }

        function novoPilar(val = '') {
            const container = document.getElementById('lista-pilar');
            const div = document.createElement('div');
            div.className = 'pilar-linha';
            div.innerHTML = `
                <input type="text" placeholder="Efeito" value="${val}" style="width: 100%; font-size: 11px;">
                <button class="btn-remover" style="padding: 2px 5px; font-size: 10px;" onclick="this.parentElement.remove(); salvarAutomatico();">X</button>
            `;
            container.appendChild(div);
            salvarAutomatico();
        }

        // --- SISTEMA DE SALVAMENTO AUTOMÁTICO EM MEMÓRIA LOCAL ---
        const salvarAutomatico = () => {
            const dados = {
                inputs: {},
                checkboxes: {},
                textareas: {},
                selects: {},
                
                itens: [],
                habilidades: [],
                obeliscos: [],
                monolitos: [],
                torres: [],
                pilares: []
            };

            // Captura inputs comuns
            document.querySelectorAll('input:not([type="checkbox"]):not([type="radio"])').forEach(el => {
                if (el.id) dados.inputs[el.id] = el.value;
            });

            // Captura checkboxes
            document.querySelectorAll('input[type="checkbox"]').forEach(el => {
                if (el.id) dados.checkboxes[el.id] = el.checked;
            });

            // Captura caixas de texto
            document.querySelectorAll('textarea').forEach(el => {
                if (el.id) dados.textareas[el.id] = el.value;
            });

            // Captura seletores
            document.querySelectorAll('select').forEach(el => {
                if (el.id) dados.selects[el.id] = el.value;
            });

            // Captura listas dinâmicas
            document.querySelectorAll('#lista-itens .item-linha').forEach(el => {
                const inputs = el.querySelectorAll('input');
                dados.itens.push({ nome: inputs[0].value, qtd: inputs[1].value });
            });

            document.querySelectorAll('#lista-habilidades .hab-linha').forEach(el => {
                const inputs = el.querySelectorAll('input');
                dados.habilidades.push({ nome: inputs[0].value, desc: inputs[1].value });
            });

            document.querySelectorAll('#lista-obelisco .obelisco-linha').forEach(el => {
                dados.obeliscos.push(el.querySelector('input').value);
            });

            document.querySelectorAll('#lista-monolito .monolito-linha').forEach(el => {
                dados.monolitos.push(el.querySelector('input').value);
            });

            document.querySelectorAll('#lista-torre .torre-linha').forEach(el => {
                dados.torres.push(el.querySelector('input').value);
            });

            document.querySelectorAll('#lista-pilar .pilar-linha').forEach(el => {
                dados.pilares.push(el.querySelector('input').value);
            });

            // Salva na memória do computador do jogador
            localStorage.setItem('ficha_evandro_v2', JSON.stringify(dados));
        };

        // --- ENXERTO DOS DADOS DE VOLTA NA TELA ---
        function aplicarDadosNaTela(dados) {
            if (!dados) return;

            // Restaura inputs comuns
            if (dados.inputs) {
                for (let id in dados.inputs) {
                    const el = document.getElementById(id);
                    if (el) el.value = dados.inputs[id];
                }
            }

            // Restaura checkboxes
            if (dados.checkboxes) {
                for (let id in dados.checkboxes) {
                    const el = document.getElementById(id);
                    if (el) el.checked = dados.checkboxes[id];
                }
            }

            // Restaura textareas e selects
            if (dados.textareas) {
                for (let id in dados.textareas) {
                    const el = document.getElementById(id);
                    if (el) el.value = dados.textareas[id];
                }
            }
            if (dados.selects) {
                for (let id in dados.selects) {
                    const el = document.getElementById(id);
                    if (el) el.value = dados.selects[id];
                }
            }

            // Limpa as listas atuais antes de recriar
            document.getElementById('lista-itens').innerHTML = '';
            document.getElementById('lista-habilidades').innerHTML = '';
            document.getElementById('lista-obelisco').innerHTML = '';
            document.getElementById('lista-monolito').innerHTML = '';
            document.getElementById('lista-torre').innerHTML = '';
            document.getElementById('lista-pilar').innerHTML = '';

            // Recria itens e conexões carregadas
            if (dados.itens) dados.itens.forEach(i => novoItem(i.nome, i.qtd));
            if (dados.habilidades) dados.habilidades.forEach(h => novaHabilidade(h.nome, h.desc));
            if (dados.obeliscos) dados.obeliscos.forEach(o => novoObelisco(o));
            if (dados.monolitos) dados.monolitos.forEach(m => novoMonolito(m));
            if (dados.torres) dados.torres.forEach(t => novaTorre(t));
            if (dados.pilares) dados.pilares.forEach(p => novoPilar(p));

            atualizarBarras();
        }

        // --- SISTEMA ONLOAD ORIGINAL ---
        window.onload = function() {
            let salvo = null;
            
            const salvoLocal = localStorage.getItem('ficha_evandro_v2');
            const salvoAntigo = localStorage.getItem('ficha_evandro');
            if (salvoLocal) salvo = JSON.parse(salvoLocal);
            else if (salvoAntigo) salvo = JSON.parse(salvoAntigo);

            if (salvo) {
                aplicarDadosNaTela(salvo);
            } else {
                // Configuração de ficha limpa na primeira vez
                novoItem();
                novaHabilidade();
                novoObelisco();
                novoMonolito();
                novaTorre();
                novoPilar();
                atualizarBarras();
            }

            // Monitora digitação manual para salvar
            document.body.addEventListener('input', (e) => {
                if (e.target.matches('input, select, textarea')) {
                    salvarAutomatico();
                }
            });
            
            document.body.addEventListener('change', (e) => {
                 if (e.target.matches('input[type="checkbox"], select')) {
                    salvarAutomatico();
                }
            });
        };

        // Escutadores extras para os cálculos do seu RPG
        document.querySelectorAll('.attr-big-input, #bp-val, #defesa-val').forEach(el => {
            el.addEventListener('input', calcularTudo);
        });

        document.querySelectorAll('.stat-input, .stat-input-edit').forEach(el => {
            el.addEventListener('input', atualizarBarras);
        });
    </script>

    <!-- Tela de Login Visual -->
    <div id="janela-login-rpg">
        <div class="caixa-login">
            <h2>Acesso à Ficha</h2>
            <input type="text" id="login-usuario" placeholder="Nome de Usuário">
            <input type="password" id="login-senha" placeholder="Senha">
            <button onclick="fazerLogin()">Entrar</button>
            <button class="btn-secundario" onclick="fazerCadastro()">Criar Novo Usuário</button>
            <div id="erro-login"></div>
        </div>
    </div>

    <!-- Botão de Sair Flutuante -->
    <button id="btn-deslogar-rpg" onclick="fazerLogout()" style="
        display: none;
        position: fixed; 
        top: 15px; 
        right: 15px; 
        z-index: 99998;
        background: #121212; 
        color: #8b0000; 
        border: 1px solid #8b0000;
        padding: 8px 15px; 
        font-family: 'Georgia', serif; 
        font-weight: bold;
        border-radius: 4px; 
        cursor: pointer; 
        box-shadow: 0 0 10px rgba(139,0,0,0.3);
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 1px;
    ">Sair da Conta</button>

    <script>
        // 1. CONFIGURAÇÃO DO SEU FIREBASE (COLE SUAS CREDENCIAIS AQUI)
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "seu-app.firebaseapp.com",
            databaseURL: "https://seu-app.firebaseio.com",
            projectId: "seu-app",
            storageBucket: "seu-app.appspot.com",
            messagingSenderId: "123456",
            appId: "1:123456:web:abcde"
        };

        // Inicialização
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();
        
        let usuarioLogadoUid = null;
        let timerFirebase = null;

        // Função de mascaramento anti-erros de e-mail (Blindada)
        function gerarEmailFake(usuario) {
            let nomeLimpo = usuario.trim().toLowerCase();
            if (nomeLimpo.includes('@')) {
                nomeLimpo = nomeLimpo.split('@')[0];
            }
            nomeLimpo = nomeLimpo.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            nomeLimpo = nomeLimpo.replace(/[^a-z0-9_.-]/g, '');
            if (!nomeLimpo) nomeLimpo = "usuarioanonimo";
            return nomeLimpo + "@sistemarpg.com";
        }

        // 2. MONITOR DE SESSÃO
        auth.onAuthStateChanged((user) => {
            const painelLogin = document.getElementById('janela-login-rpg');
            const btnSair = document.getElementById('btn-deslogar-rpg');
            
            if (user) {
                usuarioLogadoUid = user.uid;
                painelLogin.style.display = 'none'; 
                btnSair.style.display = 'block';
                carregarDadosDoFirebase();
            } else {
                usuarioLogadoUid = null;
                painelLogin.style.display = 'flex';
                btnSair.style.display = 'none';
            }
        });

        // 3. FUNÇÃO DE LOGIN
        function fazerLogin() {
            const usuario = document.getElementById('login-usuario').value;
            const senha = document.getElementById('login-senha').value;
            const divErro = document.getElementById('erro-login');
            divErro.innerText = "";

            if (!usuario || !senha) {
                divErro.innerText = "Preencha todos os campos.";
                return;
            }

            const emailFake = gerarEmailFake(usuario);

            auth.signInWithEmailAndPassword(emailFake, senha)
                .catch((error) => {
                    divErro.innerText = "Acesso negado. Usuário ou senha incorretos.";
                    console.error(error);
                });
        }

        // 4. FUNÇÃO DE CADASTRO
        function fazerCadastro() {
            const usuario = document.getElementById('login-usuario').value;
            const senha = document.getElementById('login-senha').value;
            const divErro = document.getElementById('erro-login');
            divErro.innerText = "";

            if (!usuario || !senha) {
                divErro.innerText = "Preencha todos os campos para cadastrar.";
                return;
            }

            if (senha.length < 6) {
                divErro.innerText = "A senha deve ter no mínimo 6 dígitos.";
                return;
            }

            const emailFake = gerarEmailFake(usuario);

            auth.createUserWithEmailAndPassword(emailFake, senha)
                .then((userCredential) => {
                    alert("Usuário '" + usuario.trim() + "' criado com sucesso!");
                })
                .catch((error) => {
                    if (error.code === 'auth/email-already-in-use') {
                        divErro.innerText = "Este nome de usuário já existe.";
                    } else {
                        divErro.innerText = "Erro ao cadastrar usuário.";
                    }
                    console.error(error);
                });
        }

        // 5. FUNÇÃO PARA CARREGAR OS DADOS DO USUÁRIO LOGADO
        function carregarDadosDoFirebase() {
            if (!usuarioLogadoUid) return;

            database.ref('personagens/' + usuarioLogadoUid).once('value').then((snapshot) => {
                const dados = snapshot.val();
                if (dados) {
                    console.log("Ficha do jogador carregada das nuvens!");
                    // Salva temporariamente no localStorage para sincronizar com os scripts originais
                    localStorage.setItem('ficha_evandro_v2', JSON.stringify(dados));
                    aplicarDadosNaTela(dados);
                } else {
                    console.log("Nova ficha iniciada para este usuário.");
                }
            }).catch((error) => {
                console.error("Erro de permissão ou leitura:", error);
            });
        }

        // 6. FUNÇÃO DE BACKUP SEGURO (DEBOUNCED - Economiza leituras/gravações)
        function sincronizarComFirebase() {
            if (!usuarioLogadoUid) return;

            // Cancela salvamentos anteriores pendentes para não salvar toda vez enquanto o jogador digita
            clearTimeout(timerFirebase);

            // Agenda o salvamento nas nuvens para 800ms após a última digitação/mudança
            timerFirebase = setTimeout(() => {
                const dadosLocais = localStorage.getItem('ficha_evandro_v2');
                if (dadosLocais) {
                    try {
                        const dadosJson = JSON.parse(dadosLocais);
                        database.ref('personagens/' + usuarioLogadoUid).set(dadosJson)
                            .then(() => console.log("Backup atualizado nas nuvens!"))
                            .catch(err => console.error("Erro ao sincronizar com banco:", err));
                    } catch(e) {
                        console.error("Erro ao converter JSON", e);
                    }
                }
            }, 800);
        }

        // 7. INTERCEPTADOR REVOLUCIONÁRIO (MANDATÓRIO)
        // Substitui a função do navegador do jogador. Toda vez que o código original salvar algo na
        // máquina local, o Firebase intercepta a gravação e envia para as nuvens automaticamente!
        const originalSetItem = localStorage.setItem;
        localStorage.setItem = function(key, value) {
            originalSetItem.apply(this, arguments);
            if (key === 'ficha_evandro_v2') {
                sincronizarComFirebase();
            }
        };

        // 8. FUNÇÃO PARA DESLOGAR
        function fazerLogout() {
            if (confirm("Deseja realmente sair da conta? Todas as suas alterações já estão salvas nas nuvens.")) {
                auth.signOut().then(() => {
                    localStorage.removeItem('ficha_evandro_v2');
                    window.location.reload();
                }).catch((error) => {
                    console.error("Erro ao deslogar:", error);
                });
            }
        }
    </script>
